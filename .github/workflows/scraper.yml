name: Daily Scraper (TerraBid)

on:
  schedule:
    # Se ejecuta todos los días a las 06:00 y a las 18:00 (UTC)
    - cron: '0 6,18 * * *'
  # Permite ejecución manual desde la pestaña Actions en GitHub
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar código (Checkout repository)
        uses: actions/checkout@v4

      - name: Configurar entorno Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f scraper/requirements.txt ]; then pip install -r scraper/requirements.txt; fi
          playwright install chromium

      - name: Ejecutar Scraper (BOE)
        run: |
          python scraper/boe_extractor.py

      - name: Hacer Commit y Push con los nuevos datos
        run: |
          # Configura la identidad del robot de Github Action
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Añade data.json si ha sido modificado
          git add data.json
          
          # Intenta comitear. Si nada cambió, el flujo sigue gracias a '|| echo'
          git commit -m "Auto-update: Datos de subastas renovados por scraper" || echo "No hay cambios para subir."
          
          # Lanza los cambios a la rama main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
